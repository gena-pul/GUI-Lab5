<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote Card Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #1a1714;
      --parchment:#f5f0e8;
      --gold:     #c9a84c;
      --gold-dim: #7a6030;
      --error:    #8b2e2e;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    header { text-align: center; }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    header p {
      font-size: 0.78rem;
      color: var(--gold-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    button {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.7rem 2.2rem;
      background: var(--ink);
      color: var(--parchment);
      border: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover:not(:disabled) { background: var(--gold); color: var(--ink); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner-wrap {
      display: none;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    .spinner-wrap.active { display: flex; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #ccc;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status { font-size: 0.82rem; min-height: 1.2rem; color: var(--error); letter-spacing: 1px; }

    /* ── Card ── */
    .card-wrap {
      width: 100%;
      max-width: 680px;
      position: relative;      /* required — makes it the anchor for position:absolute children */
      display: none;
    }

    .card-wrap img#photo {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
      filter: brightness(0.5); /* darken so white text is readable */
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .card-wrap img#photo.loaded { opacity: 1; }

    /* Overlay sits on top of the image using absolute positioning */
    .overlay {
      position: absolute;      /* positioned relative to .card-wrap */
      inset: 0;                /* shorthand: top:0 right:0 bottom:0 left:0 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 3rem;
      text-align: center;
      pointer-events: none;    /* clicks pass through to the image underneath */
    }

    .quote-mark {
      font-size: 5rem;
      line-height: 0.5;
      color: var(--gold);
      margin-bottom: 1rem;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }

    .quote-text {
      font-size: 1.35rem;
      font-style: italic;
      color: #fff;
      line-height: 1.65;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.5s ease 0.45s;
    }

    .quote-author {
      margin-top: 1rem;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      opacity: 0;
      transition: opacity 0.5s ease 0.6s;
    }

    /* Adding .ready to .card-wrap triggers all three CSS transitions */
    .card-wrap.ready .quote-mark,
    .card-wrap.ready .quote-text,
    .card-wrap.ready .quote-author { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <h1>Quote Card</h1>
    <p>Promise.all · picsum.photos · dummyjson.com</p>
  </header>

  <button id="btn">Generate</button>

  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    Fetching image &amp; quote…
  </div>

  <p class="status" id="status"></p>

  <div class="card-wrap" id="card">
    <img id="photo" alt="background photograph" src="https://picsum.photos/id/15/800/420" class="loaded" />
    <div class="overlay">
      <div class="quote-mark">"</div>
      <p class="quote-text"   id="quote-text">The only way to do great work is to love what you do.</p>
      <p class="quote-author" id="quote-author">— Steve Jobs</p>
    </div>
  </div>

  <script>
    /*
     * APIs — both free, no authentication, CORS-safe for browser fetch()
     * ─────────────────────────────────────────────────────────────────────
     * Quote : GET https://dummyjson.com/quotes/random
     *         Returns { id, quote, author }
     *
     * Image : https://picsum.photos/id/{n}/800/420
     *         No fetch() needed — the URL IS the image.
     *         We wrap the browser's img load event in a Promise so it can
     *         participate in Promise.all() alongside the quote fetch.
     *
     * CONCEPTS DEMONSTRATED
     * ─────────────────────
     *  1. fetchJSON()      — reusable helper: fetch + response.ok check
     *  2. loadImage()      — wraps an img load event in a Promise
     *  3. Promise.all()    — quote fetch and image load run in parallel
     *  4. Shape validation — check data before trusting it
     *  5. .catch()         — one handler covers both promises
     *  6. .finally()       — cleans up UI in all cases
     */

    var QUOTE_API  = 'https://dummyjson.com/quotes/random';
    var IMAGE_BASE = 'https://picsum.photos/id/';

    // ── DOM refs ───────────────────────────────────────────
    var btn         = document.getElementById('btn');
    var spinner     = document.getElementById('spinner');
    var statusEl    = document.getElementById('status');
    var card        = document.getElementById('card');
    var photo       = document.getElementById('photo');
    var quoteText   = document.getElementById('quote-text');
    var quoteAuthor = document.getElementById('quote-author');

    // Show card immediately — placeholder content is already in the HTML
    card.style.display = 'block';
    card.classList.add('ready');

    function fetchJSON(url) {
      return fetch(url)
        .then(function (response) {
          if (!response.ok) {
            throw new Error('HTTP ' + response.status + ' from ' + url);
          }
          return response.json();
        });
    }

    function loadImage(url) {
      return new Promise(function (resolve, reject) {
        var img = new Image();
        img.addEventListener('load',  function () { resolve(url); });
        img.addEventListener('error', function () { reject(new Error('Image failed to load')); });
        img.src = url;
      });
    }

    function randomImageUrl() {
      var id = Math.floor(Math.random() * 100) + 1;
      return IMAGE_BASE + id + '/800/420';
    }

    btn.addEventListener('click', function () {

      statusEl.textContent = '';
      card.classList.remove('ready');
      photo.classList.remove('loaded');
      btn.disabled = true;
      spinner.classList.add('active');

      var imageUrl = randomImageUrl();

      Promise.all([
        fetchJSON(QUOTE_API),
        loadImage(imageUrl)
      ])
        .then(function (results) {

          var quoteData      = results[0];
          var resolvedImgUrl = results[1];

          if (!quoteData.quote || !quoteData.author) {
            throw new Error('Unexpected quote shape — missing "quote" or "author".');
          }

          quoteText.textContent   = quoteData.quote;
          quoteAuthor.textContent = '— ' + quoteData.author;

          photo.src = resolvedImgUrl;
          photo.classList.add('loaded');

          card.classList.add('ready');
        })

        .catch(function (err) {
          statusEl.textContent = 'Error: ' + err.message;
        })

        .finally(function () {
          btn.disabled = false;
          spinner.classList.remove('active');
        });
    });
  </script>
</body>
</html>
